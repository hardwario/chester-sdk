name: Build

on:
  push:
      paths-ignore:
        - '**/README.md'
        - '.*'
      branches-ignore:
        - 'gh-pages'
      tags:
        - 'v*'
  workflow_dispatch:

jobs:
  # ------------------------
  prepare:
    runs-on: ubuntu-latest
    container:
      image: hardwario/nrf-connect-sdk-build:v2.9.0-1
    outputs:
      short_sha: ${{ steps.short-sha.outputs.short-sha }}
      samples: ${{ steps.generate-matrix.outputs.samples }}
      applications: ${{ steps.generate-matrix.outputs.applications }}
      ncs_version: ${{ steps.versions.outputs.ncs }}
      zephyr_version: ${{ steps.versions.outputs.zephyr }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          path: 'chester-sdk/chester'
          fetch-depth: 0
          fetch-tags: true
      - name: cache
        id: cache-chester-sdk
        uses: actions/cache@v4
        env:
          cache-name: cache-chester-sdk
        with:
          key: chester-sdk-${{ hashFiles('chester-sdk/chester/west.yml') }}
          restore-keys: chester-sdk-${{ hashFiles('chester-sdk/chester/west.yml') }}
          path: |
            chester-sdk/.west
            chester-sdk/bootloader
            chester-sdk/doxygen-awesome-css
            chester-sdk/modules
            chester-sdk/nrf
            chester-sdk/nrfxlib
            chester-sdk/test
            chester-sdk/tools
            chester-sdk/zephyr
      - name: west init and update
        if: steps.cache-chester-sdk.outputs.cache-hit != 'true'
        run: |
          cd chester-sdk
          west init -l --mf west.yml chester
          west update --narrow
          west config build.board chester
      - name: short_sha
        id: short-sha
        run: |
          SHORT_SHA=$(git -C chester-sdk/chester rev-parse --short HEAD)
          echo short-sha=${SHORT_SHA} >> $GITHUB_OUTPUT
      - name: versions
        id: versions
        run: |
          NCS=$(cat chester-sdk/nrf/VERSION)
          echo ncs=${NCS} >> $GITHUB_OUTPUT
          ZEPHYR=$(awk -F' *= *' '
            /^VERSION_MAJOR/ {major=$2}
            /^VERSION_MINOR/ {minor=$2}
            /^PATCHLEVEL/    {patch=$2}
            END {printf "%s.%s.%s", major, minor, patch}' chester-sdk/zephyr/VERSION)
          echo zephyr=${ZEPHYR} >> $GITHUB_OUTPUT
      - name: Generate Matrix
        id: generate-matrix
        working-directory: ./chester-sdk/chester
        run: |
          SAMPLES=$(python3 .github/gen-matrix.py samples)
          echo $SAMPLES
          echo samples=${SAMPLES} >> $GITHUB_OUTPUT
          APPLICATIONS=$(python3 .github/gen-matrix.py applications)
          echo $APPLICATIONS
          echo applications=${APPLICATIONS} >> $GITHUB_OUTPUT

  # ------------------------
  build-sample:
    runs-on: ubuntu-latest
    container:
      image: hardwario/nrf-connect-sdk-build:v2.9.0-1
    needs:
      - prepare
    # Samples are compile-checks only; skip them on release tags so the app
    # builds (and the release) aren't delayed competing for runners.
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    continue-on-error: true
    strategy:
      matrix:
        sample: ${{ fromJSON(needs.prepare.outputs.samples) }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          path: 'chester-sdk/chester'
      - name: restore cache with chester-sdk
        id: cache-chester-sdk
        uses: actions/cache/restore@v4
        env:
          cache-name: cache-chester-sdk
        with:
          fail-on-cache-miss: true
          key: chester-sdk-${{ hashFiles('chester-sdk/chester/west.yml') }}
          path: |
            chester-sdk/.west
            chester-sdk/bootloader
            chester-sdk/doxygen-awesome-css
            chester-sdk/modules
            chester-sdk/nrf
            chester-sdk/nrfxlib
            chester-sdk/test
            chester-sdk/tools
            chester-sdk/zephyr
      - name: build
        run: |
          cd chester-sdk/chester/samples/${{ matrix.sample }}
          west build
  # ------------------------
  build-app:
    runs-on: ubuntu-latest
    container:
      image: hardwario/nrf-connect-sdk-build:v2.9.0-1
    needs:
      - prepare
    continue-on-error: true
    strategy:
      matrix:
        application: ${{ fromJSON(needs.prepare.outputs.applications) }}
        exclude:
          - application: _legacy
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          path: 'chester-sdk/chester'
          fetch-depth: 0
          fetch-tags: true
      - name: gen build command
        id: build-command
        working-directory: ./chester-sdk/chester
        run: |
          APP_PATH=$(python3 .github/gen-applications.py ${{ matrix.application }} path)
          echo $APP_PATH
          echo app_path=${APP_PATH} >> $GITHUB_OUTPUT
          BUILD_CMD=$(python3 .github/gen-applications.py ${{ matrix.application }} cmd)
          echo $BUILD_CMD
          echo build_cmd=${BUILD_CMD} >> $GITHUB_OUTPUT
      - name: restore cache with chester-sdk
        id: cache-chester-sdk
        uses: actions/cache/restore@v4
        env:
          cache-name: cache-chester-sdk
        with:
          fail-on-cache-miss: true
          key: chester-sdk-${{ hashFiles('chester-sdk/chester/west.yml') }}
          path: |
            chester-sdk/.west
            chester-sdk/bootloader
            chester-sdk/doxygen-awesome-css
            chester-sdk/modules
            chester-sdk/nrf
            chester-sdk/nrfxlib
            chester-sdk/test
            chester-sdk/tools
            chester-sdk/zephyr
      - name: build
        working-directory: ${{ steps.build-command.outputs.app_path }}
        run: ${{ steps.build-command.outputs.build_cmd }}
      - name: stage firmware
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: ${{ steps.build-command.outputs.app_path }}
        run: |
          set -euo pipefail
          # Sysbuild output layout (NCS v3.3+): the merged image and DFU bundle
          # live at the top of build/, and the application image lives in the
          # per-domain dir build/<app>/zephyr/.
          # NOTE: zephyr.elf is deliberately NOT staged. The debug build's elf is
          # ~17 MB, which pushes the multipart upload past the firmware server's
          # reverse-proxy body-size limit (~10 MB), causing the upload to fail
          # (HTTP 400 / TLS reset). The merged hex + DFU bundle + manifest are all
          # the distribution server needs; the elf would only add cloud symbolication.
          # Re-add the elf here once the proxy limit is raised.
          # The application domain is the only non-mcuboot domain in build/.
          app_domain=$(ls -d build/*/zephyr | grep -v '/mcuboot/zephyr$')
          # Top-level merged image, DFU bundle and manifest.
          install -D -t stage/build \
            build/merged_*.hex \
            build/dfu_application.zip \
            build/dfu_application.zip_manifest.json
          # Application image and signed update binaries.
          install -D -t "stage/$app_domain" \
            "$app_domain"/zephyr.hex \
            "$app_domain"/zephyr.signed.bin \
            "$app_domain"/zephyr.signed.hex
      - name: upload firmware artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: fw-${{ matrix.application }}
          path: ${{ steps.build-command.outputs.app_path }}/stage
          retention-days: 1
          if-no-files-found: error
  # ------------------------
  release:
    runs-on: ubuntu-latest
    container:
      image: hardwario/nrf-connect-sdk-build:v2.9.0-1
    needs:
      - prepare
      - build-app
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          path: 'chester-sdk/chester'
      - name: download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: 'fw-*'
      - name: install hardwario cli
        run: pip install hardwario
      - name: upload firmware and build notes
        working-directory: ./chester-sdk/chester
        env:
          HARDWARIO_CLOUD_TOKEN: ${{ secrets.HARDWARIO_CLOUD_TOKEN }}
        run: |
          python3 .github/gen-release-notes.py \
            --artifacts "${GITHUB_WORKSPACE}/artifacts" \
            --version "${{ github.ref_name }}" \
            --ncs "${{ needs.prepare.outputs.ncs_version }}" \
            --zephyr "${{ needs.prepare.outputs.zephyr_version }}" \
            --out "${GITHUB_WORKSPACE}/notes.md"
      - name: create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: notes.md
