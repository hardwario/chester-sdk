description: HARDWARIO CHESTER-V1 Driver

compatible: "hardwario,ctr-v1"

include: base.yaml

properties:

  modem-reset-gpios:
    type: phandle-array
    required: true
    description: Astronode S Module reset pin

  modem-wakeup-gpios:
    type: phandle-array
    required: true
    description: Astronode S Module wakeup pin

  modem-event-gpios:
    type: phandle-array
    required: true
    description: Astronode S Module event pin
